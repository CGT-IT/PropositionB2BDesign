<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes offres touristiques</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
<div class="page-shell">

  <aside id="sidebar" class="sidebar"></aside>

  <div class="content-wrapper">
    <div class="page-header d-flex justify-content-between align-items-center">
      <div>
        <h1 class="h3 mb-1">Mes offres touristiques</h1>
        <p class="text-muted mb-0">Gestion de vos offres en ligne</p>
      </div>
      <button class="btn btn-success">+ Créer une offre</button>
    </div>

    <main class="page-content">
      <div class="container-fluid">

        <!-- Filtres -->
        <div class="card table-card mb-4">
          <div class="card-body">
            <div class="row gy-3">
              <div class="col-md-3">
                <label class="form-label" for="filter-type">Type d'offre</label>
                <select class="form-select form-select-sm" id="filter-type"></select>
              </div>
              <div class="col-md-3">
                <label class="form-label" for="filter-status">Statut</label>
                <select class="form-select form-select-sm" id="filter-status"></select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="search">Rechercher</label>
                <div class="input-group input-group-sm">
                  <input type="search" class="form-control" id="search" placeholder="Rechercher...">
                  <button class="btn btn-outline-secondary" aria-label="Lancer la recherche"><i class="bi bi-search"></i></button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tableau -->
        <div class="card table-card">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:40px;"></th>
                  <th class="sortable" data-sort="name">Nom <i class="bi bi-chevron-expand"></i></th>
                  <th class="d-none d-md-table-cell sortable" data-sort="type">Type <i class="bi bi-chevron-expand"></i></th>
                  <th class="d-none d-md-table-cell sortable" data-sort="status">Statut <i class="bi bi-chevron-expand"></i></th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/offers.js"></script>
</body>
</html>
